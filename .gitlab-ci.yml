image: python:3.12-slim

variables:
  UV_VERSION: "0.8.17"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

cache:
  paths:
    - .cache/pip
    - .cache/uv

before_script:
  - apt-get update && apt-get install -y --no-install-recommends libatomic1 && rm -rf /var/lib/apt/lists/*
  - pip install uv==$UV_VERSION
  - uv sync --frozen --all-groups

stages:
  - test

version_check:
  stage: test
  script:
    - make version-check

lint:
  stage: test
  script:
    - uv run ruff format --check
    - uv run ruff check

typecheck:
  stage: test
  script:
    - uv run python -m pyright

pytest:
  stage: test
  script:
    - uv run python -m pytest --cov=src/modelmeter --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
