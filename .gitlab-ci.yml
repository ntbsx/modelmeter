image: python:3.12-slim

variables:
  UV_VERSION: "0.8.17"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

cache:
  paths:
    - .cache/pip
    - .cache/uv

before_script:
  - apt-get update && apt-get install -y --no-install-recommends libatomic1 make git && rm -rf /var/lib/apt/lists/*
  - pip install uv==$UV_VERSION
  - uv sync --frozen --all-groups

stages:
  - test
  - release

version_check:
  stage: test
  script:
    - make version-check

contract_policy:
  stage: test
  script:
    - |
      if [ -n "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" ]; then
        git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
      elif [ -n "$CI_DEFAULT_BRANCH" ]; then
        git fetch origin "$CI_DEFAULT_BRANCH"
      fi
    - make contract-policy-check

lint:
  stage: test
  script:
    - uv run ruff format --check
    - uv run ruff check

frontend_lint:
  image: node:22
  stage: test
  before_script: []
  script:
    - npm ci --prefix web
    - npm run --prefix web lint

package_smoke:
  stage: test
  script:
    - apt-get update && apt-get install -y --no-install-recommends nodejs npm && rm -rf /var/lib/apt/lists/*
    - npm ci --prefix web
    - make package-build
    - uv run python -c "import zipfile, pathlib; wheels=sorted(pathlib.Path('dist').glob('*.whl')); assert wheels, 'No wheel built'; z=zipfile.ZipFile(wheels[-1]); assert any(n.endswith('modelmeter/web_dist/index.html') for n in z.namelist()), 'Bundled web_dist/index.html missing in wheel'"

perf_guardrail:
  stage: test
  script:
    - apt-get update && apt-get install -y --no-install-recommends nodejs npm && rm -rf /var/lib/apt/lists/*
    - npm ci --prefix web
    - npm run --prefix web build
    - make perf-guardrail

typecheck:
  stage: test
  script:
    - uv run python -m pyright

pytest:
  stage: test
  script:
    - uv run python -m pytest --cov=src/modelmeter --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

release_artifacts:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{4}\.\d{1,2}\.\d{1,2}$/'
  script:
    - |
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      PYPROJECT_VERSION=$(python - <<'PY'
      import tomllib
      from pathlib import Path
      data = tomllib.loads(Path('pyproject.toml').read_text())
      print(data['project']['version'])
      PY
      )
      WEB_VERSION=$(python - <<'PY'
      import json
      from pathlib import Path
      data = json.loads(Path('web/package.json').read_text())
      print(data['version'])
      PY
      )

      if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ] || [ "$TAG_VERSION" != "$WEB_VERSION" ]; then
        echo "Release version mismatch detected"
        echo "Tag version:        $TAG_VERSION"
        echo "pyproject version:  $PYPROJECT_VERSION"
        echo "web/package version:$WEB_VERSION"
        echo "Fix versions (make version-sync/version-stamp) and retag before releasing."
        exit 1
      fi
    - apt-get update && apt-get install -y --no-install-recommends nodejs npm && rm -rf /var/lib/apt/lists/*
    - npm ci --prefix web
    - make package-build
  artifacts:
    paths:
      - dist/*.whl
      - dist/*.tar.gz
    expire_in: 14 days

release_publish:
  stage: release
  needs:
    - job: release_artifacts
      artifacts: true
  before_script: []
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{4}\.\d{1,2}\.\d{1,2}$/'
  script:
    - |
      apt-get update && apt-get install -y --no-install-recommends curl && rm -rf /var/lib/apt/lists/*
      VERSION="${CI_COMMIT_TAG#v}"
      WHEEL_FILE="modelmeter-${VERSION}-py3-none-any.whl"
      SDIST_FILE="modelmeter-${VERSION}.tar.gz"
      WHEEL_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/modelmeter/${CI_COMMIT_TAG}/${WHEEL_FILE}"
      SDIST_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/modelmeter/${CI_COMMIT_TAG}/${SDIST_FILE}"

      curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/${WHEEL_FILE}" "${WHEEL_URL}"
      curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/${SDIST_FILE}" "${SDIST_URL}"

      RELEASE_PAYLOAD="$(cat <<EOF
      {
        "name": "ModelMeter ${CI_COMMIT_TAG}",
        "tag_name": "${CI_COMMIT_TAG}",
        "description": "Automated release for ${CI_COMMIT_TAG}",
        "assets": {
          "links": [
            {"name": "modelmeter-wheel", "url": "${WHEEL_URL}"},
            {"name": "modelmeter-sdist", "url": "${SDIST_URL}"}
          ]
        }
      }
      EOF
      )"

      STATUS_CODE=$(curl --silent --output /tmp/release.json --write-out "%{http_code}" \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "${RELEASE_PAYLOAD}" \
        --request POST \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")

      if [ "${STATUS_CODE}" = "201" ]; then
        echo "Release created for ${CI_COMMIT_TAG}."
      elif [ "${STATUS_CODE}" = "409" ]; then
        echo "Release already exists, updating metadata and ensuring asset links exist."
        curl --fail \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "${RELEASE_PAYLOAD}" \
          --request PUT \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}"
      else
        echo "Release API request failed with status ${STATUS_CODE}"
        cat /tmp/release.json
        exit 1
      fi

release_installer_smoke:
  stage: release
  needs:
    - job: release_publish
  before_script: []
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{4}\.\d{1,2}\.\d{1,2}$/'
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl && rm -rf /var/lib/apt/lists/*
    - bash scripts/install.sh --version "${CI_COMMIT_TAG#v}" --method pip
    - export PATH="$HOME/.local/bin:$PATH"
    - modelmeter --version
    - modelmeter serve --host 127.0.0.1 --port 18080 --no-access-log >/tmp/modelmeter-serve.log 2>&1 &
    - SERVER_PID=$!
    - sleep 3
    - curl --fail http://127.0.0.1:18080/health
    - kill ${SERVER_PID}
