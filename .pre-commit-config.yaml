repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run python -m pyright
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run --prefix web lint
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: version-check
        name: version-check
        entry: uv run python scripts/sync_product_version.py --check
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: check-types
        name: check-types
        entry: npm run --prefix web check:types
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run python -m pytest
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: vitest
        name: vitest
        entry: npm run --prefix web test -- --run
        language: system
        pass_filenames: false
        stages: [pre-push]
