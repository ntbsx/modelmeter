name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate tag format
        id: release_meta
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "${TAG_NAME}" =~ ^v([0-9]{4}\.([1-9]|1[0-2])\.[0-9]+)(rc[0-9]+)?$ ]]; then
            echo "Invalid release tag format: ${TAG_NAME}"
            echo "Expected stable: vYYYY.M.x or prerelease: vYYYY.M.xrcN"
            exit 1
          fi

          TAG_VERSION="${BASH_REMATCH[1]}${BASH_REMATCH[3]}"
          BASE_VERSION="${BASH_REMATCH[1]}"
          SUFFIX="${BASH_REMATCH[3]}"
          if [[ -n "${SUFFIX}" ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "tag_version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "base_version=${BASE_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: |
          uv sync --frozen --all-groups
          npm ci --prefix web

      - name: Validate tag and project versions
        run: |
          TAG_VERSION="${{ steps.release_meta.outputs.tag_version }}"
          BASE_VERSION="${{ steps.release_meta.outputs.base_version }}"
          IS_PRERELEASE="${{ steps.release_meta.outputs.prerelease }}"
          PYPROJECT_VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text())
          print(data['project']['version'])
          PY
          )
          WEB_VERSION=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('web/package.json').read_text())
          print(data['version'])
          PY
          )

          if [ "${IS_PRERELEASE}" = "true" ]; then
            EXPECTED_VERSION="${BASE_VERSION}"
          else
            EXPECTED_VERSION="${TAG_VERSION}"
          fi

          if [ "${EXPECTED_VERSION}" != "${PYPROJECT_VERSION}" ] || [ "${EXPECTED_VERSION}" != "${WEB_VERSION}" ]; then
            echo "Release version mismatch detected"
            echo "Tag version:         ${TAG_VERSION}"
            echo "Expected version:    ${EXPECTED_VERSION}"
            echo "pyproject version:   ${PYPROJECT_VERSION}"
            echo "web/package version: ${WEB_VERSION}"
            exit 1
          fi

      - name: Apply prerelease version in CI workspace
        if: ${{ steps.release_meta.outputs.prerelease == 'true' }}
        run: |
          TAG_VERSION="${{ steps.release_meta.outputs.tag_version }}"
          python - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          tag_version = "${{ steps.release_meta.outputs.tag_version }}"

          pyproject_path = Path("pyproject.toml")
          pyproject_text = pyproject_path.read_text()
          pyproject = tomllib.loads(pyproject_text)
          current = pyproject["project"]["version"]
          pyproject_path.write_text(pyproject_text.replace(f'version = "{current}"', f'version = "{tag_version}"', 1))

          package_path = Path("web/package.json")
          package = json.loads(package_path.read_text())
          package["version"] = tag_version
          package_path.write_text(f"{json.dumps(package, indent=2)}\n")
          PY

      - name: Build package artifacts
        run: make package-build

      - name: Smoke test packaged wheel
        run: |
          WHEEL_FILE=$(python - <<'PY'
          import pathlib
          wheels = sorted(pathlib.Path('dist').glob('*.whl'))
          if not wheels:
            raise SystemExit('No wheel built')
          print(str(wheels[-1]))
          PY
          )
          python3 -m pip install --user --upgrade "${WHEEL_FILE}"
          export PATH="$HOME/.local/bin:$PATH"
          modelmeter --version
          modelmeter serve --host 127.0.0.1 --port 18080 --no-access-log >/tmp/modelmeter-serve.log 2>&1 &
          SERVER_PID=$!
          trap "kill ${SERVER_PID}" EXIT
          sleep 3
          curl --fail http://127.0.0.1:18080/health

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          files: |
            dist/*.whl
            dist/*.tar.gz
