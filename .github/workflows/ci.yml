name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ============================================================================
  # STAGE 1: Lint (Fast errors first)
  # ============================================================================
  lint_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Ruff lint
        run: uv run ruff check

  lint_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix web
      - name: ESLint
        run: npm run --prefix web lint

  # ============================================================================
  # STAGE 2: Type Check & Contracts (Depends on lint)
  # ============================================================================
  check_backend:
    needs: [lint_backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Pyright
        run: uv run python -m pyright
      - name: Version check
        run: make version-check

  gen_types:
    needs: [lint_backend, lint_frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Python dependencies
        run: uv sync --frozen --all-groups
      - name: Install frontend dependencies
        run: npm ci --prefix web
      - name: Generate TypeScript types
        run: npm run --prefix web gen:types

  check_frontend:
    needs: [gen_types]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix web
      - name: TypeScript types check
        run: git diff --exit-code -- web/src/generated/api.ts web/src/generated/openapi.sha256

  contract_policy:
    needs: [lint_backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Fetch comparison branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.event.pull_request.base.ref }}"
          else
            git fetch origin "${{ github.event.repository.default_branch }}"
          fi
      - name: Contract policy check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run python scripts/check_contract_version_policy.py --base-ref "origin/${{ github.event.pull_request.base.ref }}"
          else
            uv run python scripts/check_contract_version_policy.py --base-ref "origin/${{ github.event.repository.default_branch }}"
          fi

  # ============================================================================
  # STAGE 3: Tests (Depends on type checks)
  # ============================================================================
  test_backend:
    needs: [check_backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Pytest
        run: uv run python -m pytest -n auto

  test_frontend:
    needs: [check_frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix web
      - name: Vitest
        run: npm run --prefix web test -- --run

  # ============================================================================
  # STAGE 4: Security (Independent - runs in parallel)
  # ============================================================================
  security_deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Run pip-audit
        run: uv run pip-audit --skip-editable

  security_secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run trufflehog
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" \
            trufflesecurity/trufflehog:latest filesystem /workspace \
            --no-update
