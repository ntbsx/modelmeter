name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Python dependencies
        run: uv sync --frozen --all-groups
      - name: Install frontend dependencies
        run: npm ci --prefix web
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Ruff lint
        run: uv run ruff check
      - name: ESLint
        run: npm run --prefix web lint

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Python dependencies
        run: uv sync --frozen --all-groups
      - name: Install frontend dependencies
        run: npm ci --prefix web
      - name: Pyright
        run: uv run python -m pyright
      - name: Version check
        run: make version-check
      - name: TypeScript types check
        run: npm run --prefix web check:types

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Python dependencies
        run: uv sync --frozen --all-groups
      - name: Install frontend dependencies
        run: npm ci --prefix web
      - name: Pytest
        run: uv run python -m pytest -n auto
      - name: Vitest
        run: npm run --prefix web test -- --run

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync --frozen --all-groups
      - name: Run pip-audit
        run: uv run pip-audit
      - name: Run trufflehog
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" \
            trufflesecurity/trufflehog:latest filesystem /workspace \
            --no-update

  contract-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync --frozen --all-groups
      - name: Fetch comparison branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.event.pull_request.base.ref }}"
          else
            git fetch origin "${{ github.event.repository.default_branch }}"
          fi
      - name: Contract policy check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run python scripts/check_contract_version_policy.py --base-ref "origin/${{ github.event.pull_request.base.ref }}"
          else
            uv run python scripts/check_contract_version_policy.py --base-ref "origin/${{ github.event.repository.default_branch }}"
          fi
